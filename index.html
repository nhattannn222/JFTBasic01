<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Form trắc nghiệm JFT Basic 01 [Hương Sensei]</title>
    <style>
      :root {
        --bg: #ffffff;
        --card: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: rgba(17, 24, 39, 0.14);
        --accent: #6ea8fe;
        --good: #2ecc71;
        --bad: #ff5b6e;
        --warn: #b45309;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        color: var(--text);
        background: var(--bg);
      }
      .wrap {
        max-width: 980px;
        margin: 28px auto 56px;
        padding: 0 16px;
      }
      header {
        display: grid;
        gap: 10px;
        margin-bottom: 16px;
      }
      .title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }
      .subtitle {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.4;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 14px 40px rgba(17, 24, 39, 0.10);
      }
      .controls {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-bottom: 12px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }
      label.small {
        color: var(--muted);
        font-size: 13px;
      }
      input[type="text"] {
        width: 100%;
        padding: 12px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #ffffff;
        color: var(--text);
        outline: none;
      }
      input[type="text"]:focus {
        border-color: rgba(110, 168, 254, 0.55);
        box-shadow: 0 0 0 3px rgba(110, 168, 254, 0.18);
      }
      .btns {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      button {
        appearance: none;
        border: 1px solid var(--border);
        background: #ffffff;
        color: var(--text);
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 650;
      }
      button.primary {
        border-color: rgba(37, 99, 235, 0.35);
        background: rgba(37, 99, 235, 0.08);
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .result {
        margin-top: 12px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #f9fafb;
        display: none;
        gap: 10px;
      }
      .result.show { display: grid; }
      .result .score {
        font-size: 16px;
        font-weight: 800;
      }
      .result .meta {
        color: var(--muted);
        font-size: 13px;
      }
      .hint {
        color: var(--warn);
        font-size: 13px;
        display: none;
      }
      .hint.show { display: block; }
      .quiz {
        margin-top: 14px;
      }

      /* Normalize imported markup from data.txt */
      #questionContainer { display: grid; gap: 18px; }
      #questionContainer > .title > p,
      #questionContainer .title-group > p {
        margin: 0;
        font-weight: 800;
        font-size: 18px;
      }
      #questionContainer .title { margin-top: 10px; }
      #questionContainer .group {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
        background: #ffffff;
      }
      #questionContainer .title-group { margin-bottom: 10px; color: var(--text); }
      #questionContainer .sub-title { color: var(--muted); font-weight: 500; }
      #questionContainer .question {
        padding: 10px 10px;
        border-radius: 12px;
        border: 1px solid rgba(17, 24, 39, 0.10);
        background: #ffffff;
        margin: 10px 0;
      }
      #questionContainer .question p {
        margin: 0 0 10px;
        line-height: 1.45;
      }
      #questionContainer label {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(17, 24, 39, 0.10);
        margin: 8px 0;
        cursor: pointer;
        user-select: none;
        background: #ffffff;
        color: var(--text);
      }
      #questionContainer input[type="radio"] { margin-top: 3px; }
      #questionContainer img.question-img {
        max-width: 100%;
        height: auto;
        display: block;
        border-radius: 12px;
        border: 1px solid rgba(17, 24, 39, 0.12);
        margin: 10px 0;
      }
      #questionContainer .audio-player { margin: 10px 0; }

      /* After submit feedback */
      .q-correct { border-color: rgba(46, 204, 113, 0.45) !important; }
      .q-wrong { border-color: rgba(255, 91, 110, 0.45) !important; }
      .opt-correct { border-color: rgba(46, 204, 113, 0.55) !important; background: rgba(46, 204, 113, 0.12) !important; }
      .opt-wrong { border-color: rgba(255, 91, 110, 0.55) !important; background: rgba(255, 91, 110, 0.12) !important; }
      .q-missing { border-color: rgba(180, 83, 9, 0.55) !important; background: rgba(180, 83, 9, 0.06) !important; }

      .bottom-actions {
        position: sticky;
        bottom: 0;
        margin-top: 14px;
        padding: 12px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(6px);
      }

      @media (min-width: 760px) {
        .controls { grid-template-columns: 1.3fr 1fr; align-items: end; }
        .row { grid-template-columns: 1fr; }
      }
    </style>
  </head>

    <script>
      const fullNameEl = document.getElementById("fullName");
      const nameHintEl = document.getElementById("nameHint");
      const allAnsweredHintEl = document.getElementById("allAnsweredHint");
      const submitBtn = document.getElementById("submitBtn");
      const resetBtn = document.getElementById("resetBtn");
      const resultEl = document.getElementById("result");
      const mountEl = document.getElementById("mount");
      const dataTpl = document.getElementById("dataTemplate");

      function normalizeAndExtractAnswers(root) {
        const questions = Array.from(root.querySelectorAll(".question"));
        for (const q of questions) {
          q.classList.remove("q-correct", "q-wrong", "q-missing");
          q.removeAttribute("data-correct");
          const labels = Array.from(q.querySelectorAll("label"));
          let correctValue = null;

          for (const lb of labels) {
            const input = lb.querySelector('input[type="radio"]');
            if (!input) continue;

            // Identify correct answer: label has inline style containing 'green'
            const style = (lb.getAttribute("style") || "").toLowerCase();
            if (style.includes("green")) correctValue = input.value;

            // Make selectable
            input.disabled = false;
            input.checked = false;

            // Remove old "answer key" hints from data.txt
            lb.classList.remove("selected-answer");
            lb.removeAttribute("style");
            lb.classList.remove("opt-correct", "opt-wrong");
          }

          if (correctValue) q.dataset.correct = correctValue;
        }

        // data.txt includes embedded <style> blocks inside titles; keep them (tables rely on it)
        return root;
      }

      function renderQuiz() {
        const frag = dataTpl.content.cloneNode(true);
        const container = frag.querySelector("#questionContainer");
        normalizeAndExtractAnswers(container);
        mountEl.replaceChildren(container);
      }

      function getAllQuestionBlocks() {
        return Array.from(mountEl.querySelectorAll(".question")).filter((q) =>
          q.querySelector('input[type="radio"]')
        );
      }

      function getUserChoice(questionEl) {
        const checked = questionEl.querySelector('input[type="radio"]:checked');
        return checked ? checked.value : null;
      }

      function lockInputs() {
        for (const input of mountEl.querySelectorAll('input[type="radio"]')) input.disabled = true;
      }

      function unlockInputsAndClear() {
        for (const q of getAllQuestionBlocks()) {
          q.classList.remove("q-correct", "q-wrong", "q-missing");
          for (const lb of q.querySelectorAll("label")) lb.classList.remove("opt-correct", "opt-wrong");
          for (const input of q.querySelectorAll('input[type="radio"]')) {
            input.disabled = false;
            input.checked = false;
          }
        }
      }

      function grade() {
        const name = (fullNameEl.value || "").trim();
        if (!name) {
          nameHintEl.classList.add("show");
          allAnsweredHintEl.classList.remove("show");
          fullNameEl.focus();
          return;
        }
        nameHintEl.classList.remove("show");
        allAnsweredHintEl.classList.remove("show");

        const questions = getAllQuestionBlocks();
        let correct = 0;
        let answered = 0;
        const missing = [];

        for (const q of questions) {
          q.classList.remove("q-missing");
          const choice = getUserChoice(q);
          if (choice) answered++;
          else missing.push(q);
        }

        // Require: all questions must be answered
        if (missing.length > 0) {
          allAnsweredHintEl.classList.add("show");
          // Mark missing + scroll to first missing question
          for (const q of missing) q.classList.add("q-missing");
          missing[0].scrollIntoView({ behavior: "smooth", block: "center" });
          return;
        }

        for (let i = 0; i < questions.length; i++) {
          const q = questions[i];
          const correctValue = q.dataset.correct || null;
          const choice = getUserChoice(q);
          const isCorrect = !!choice && !!correctValue && choice === correctValue;
          if (isCorrect) correct++;

          q.classList.toggle("q-correct", isCorrect);
          q.classList.toggle("q-wrong", !isCorrect);

          const labels = Array.from(q.querySelectorAll("label"));
          for (const lb of labels) {
            const input = lb.querySelector('input[type="radio"]');
            if (!input) continue;
            if (correctValue && input.value === correctValue) lb.classList.add("opt-correct");
            if (choice && input.value === choice && choice !== correctValue) lb.classList.add("opt-wrong");
          }
        }

        lockInputs();

        const total = questions.length;
        const pct = total ? Math.round((correct / total) * 100) : 0;

        resultEl.classList.add("show");
        resultEl.innerHTML = `
          <div class="score">${name}: Điểm ${correct}/${total} (${pct}%)</div>
          <div class="meta">Mỗi câu 1 điểm. Đã chọn: ${answered}/${total} câu.</div>
        `;
        resultEl.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function resetAll() {
        resultEl.classList.remove("show");
        resultEl.innerHTML = "";
        nameHintEl.classList.remove("show");
        allAnsweredHintEl.classList.remove("show");
        unlockInputsAndClear();
        fullNameEl.focus();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      submitBtn.addEventListener("click", grade);
      resetBtn.addEventListener("click", resetAll);
      fullNameEl.addEventListener("input", () => nameHintEl.classList.remove("show"));
      fullNameEl.addEventListener("input", () => allAnsweredHintEl.classList.remove("show"));

      renderQuiz();
      fullNameEl.focus();
    </script>
